[build]
  base = "."
  command = "npm install --workspace hillside-next lightningcss-linux-x64-gnu@1.31.1 --no-save && npm run build --workspace hillside-next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"
  NPM_CONFIG_OPTIONAL = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
