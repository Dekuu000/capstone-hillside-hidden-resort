<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Hillside Resort</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f7fb;
        color: #0b1f3b;
      }
      main {
        width: min(540px, calc(100vw - 2rem));
        border: 1px solid #dbe5f1;
        border-radius: 18px;
        background: #fff;
        padding: 1.25rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0.5rem 0;
        color: #4f617f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>The app shell is cached. Reconnect to refresh live reservations and token issuance.</p>
      <p>Admin can continue with offline queue and preload-backed validation.</p>
    </main>
  </body>
</html>
