<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4e4"/>
      <stop offset="1" stop-color="#dfe9cf"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6e0da"/>
      <stop offset="1" stop-color="#52b3ac"/>
    </linearGradient>
    <radialGradient id="tree" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#bcd6a0"/>
      <stop offset="1" stop-color="#84ac68"/>
    </radialGradient>
    <radialGradient id="treeDark" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#9cbf7d"/>
      <stop offset="1" stop-color="#6c9654"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#33402c" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Grass / clearing base -->
  <rect width="1200" height="800" fill="url(#grass)"/>

  <!-- Forest masses: dense on the left + top-left, plus edges (the hillside) -->
  <path d="M0,0 H470 C440,90 470,180 360,215 C415,300 300,335 330,420 C235,445 255,560 150,565 C190,655 85,695 0,695 Z" fill="#b6cf9b"/>
  <path d="M0,0 H350 C335,75 350,155 265,185 C300,255 215,305 250,365 C150,388 175,475 92,488 C122,565 45,605 0,605 Z" fill="#a3c184"/>
  <path d="M1200,235 C1085,250 1055,335 1092,430 C1010,470 1042,565 1125,585 C1152,648 1200,660 1200,660 L1200,235 Z" fill="#aecb95"/>
  <path d="M360,800 C405,720 545,742 605,795 C705,765 770,800 770,800 Z" fill="#b6cf9b"/>

  <!-- Stream meandering through the grounds -->
  <path d="M150,-10 C235,150 130,255 270,335 C420,420 470,560 700,560 C905,560 985,690 1120,815" fill="none" stroke="url(#water)" stroke-width="26" stroke-linecap="round" opacity="0.65"/>
  <path d="M150,-10 C235,150 130,255 270,335 C420,420 470,560 700,560 C905,560 985,690 1120,815" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.3"/>

  <!-- Subtle walkways linking the grounds -->
  <g stroke="#e7d8bf" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M190,150 C380,185 540,165 700,190 C800,206 868,250 888,260"/>
    <path d="M190,150 C250,290 330,360 420,402"/>
    <path d="M420,402 C520,365 600,360 636,348"/>
    <path d="M636,348 C720,400 800,440 852,468"/>
    <path d="M852,468 C920,440 968,410 996,390"/>
    <path d="M252,576 C400,560 480,562 552,560 C700,556 800,510 852,468"/>
    <path d="M420,402 C470,470 510,520 552,560"/>
  </g>

  <!-- Hidden Garden (53,43) : circular flower bed -->
  <g>
    <circle cx="636" cy="344" r="46" fill="#cfe6b8"/>
    <circle cx="636" cy="344" r="46" fill="none" stroke="#9bbd7d" stroke-width="3"/>
    <circle cx="620" cy="332" r="6" fill="#e58aa0"/>
    <circle cx="650" cy="330" r="6" fill="#f2c14e"/>
    <circle cx="636" cy="356" r="6" fill="#d76f8e"/>
    <circle cx="654" cy="352" r="5" fill="#efb43e"/>
    <circle cx="618" cy="352" r="5" fill="#e8d35a"/>
  </g>

  <!-- Swimming pool (58,20) : deck + water + loungers -->
  <g filter="url(#soft)">
    <rect x="600" y="92" width="214" height="150" rx="20" fill="#f4ede1"/>
    <rect x="628" y="116" width="158" height="102" rx="16" fill="url(#water)"/>
    <path d="M636,150 C690,134 730,182 778,168" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
    <g fill="#ffffff" opacity="0.92">
      <rect x="610" y="104" width="14" height="26" rx="3"/>
      <rect x="610" y="136" width="14" height="26" rx="3"/>
      <rect x="610" y="168" width="14" height="26" rx="3"/>
    </g>
    <circle cx="800" cy="110" r="9" fill="#bfe2a6"/>
  </g>

  <!-- Evergreen Pavilion (74,30) : large event pavilion, terracotta roof -->
  <g filter="url(#soft)">
    <rect x="816" y="196" width="150" height="96" rx="10" fill="#b5613a"/>
    <rect x="816" y="196" width="150" height="96" rx="10" fill="none" stroke="#8f4a2b" stroke-width="2"/>
    <line x1="891" y1="200" x2="891" y2="288" stroke="#8f4a2b" stroke-width="2" opacity="0.7"/>
    <line x1="820" y1="244" x2="962" y2="244" stroke="#8f4a2b" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Lobby / reception (15,14) : entrance with canopy -->
  <g filter="url(#soft)">
    <rect x="120" y="78" width="120" height="74" rx="9" fill="#cf7a4f"/>
    <line x1="120" y1="115" x2="240" y2="115" stroke="#9c5733" stroke-width="2" opacity="0.6"/>
    <rect x="150" y="150" width="60" height="26" rx="6" fill="#efe7da"/>
  </g>

  <!-- Cottage cluster (35,50) : three pitched cottages -->
  <g filter="url(#soft)">
    <rect x="356" y="372" width="64" height="52" rx="8" fill="#7f9a63"/>
    <line x1="388" y1="376" x2="388" y2="420" stroke="#5f7848" stroke-width="2" opacity="0.6"/>
    <rect x="438" y="356" width="60" height="48" rx="8" fill="#8aa56d"/>
    <line x1="468" y1="360" x2="468" y2="400" stroke="#62804a" stroke-width="2" opacity="0.6"/>
    <rect x="392" y="430" width="68" height="50" rx="8" fill="#76915b"/>
    <line x1="426" y1="434" x2="426" y2="476" stroke="#566f40" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Luxe Hideaway units 1-3 (21,72) : row of units -->
  <g filter="url(#soft)">
    <rect x="176" y="548" width="50" height="56" rx="8" fill="#cf7a4f"/>
    <rect x="234" y="548" width="50" height="56" rx="8" fill="#c87146"/>
    <rect x="292" y="548" width="50" height="56" rx="8" fill="#cf7a4f"/>
    <line x1="201" y1="552" x2="201" y2="600" stroke="#9c5733" stroke-width="2" opacity="0.5"/>
    <line x1="259" y1="552" x2="259" y2="600" stroke="#9c5733" stroke-width="2" opacity="0.5"/>
    <line x1="317" y1="552" x2="317" y2="600" stroke="#9c5733" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Pinecrest Exclusive villa (83,48) : secluded among trees -->
  <g filter="url(#soft)">
    <rect x="956" y="356" width="78" height="60" rx="9" fill="#b5613a"/>
    <line x1="995" y1="360" x2="995" y2="412" stroke="#8f4a2b" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Tour Meet Point (71,58) : paved gathering circle -->
  <g>
    <circle cx="852" cy="464" r="30" fill="#ecdcc1"/>
    <circle cx="852" cy="464" r="30" fill="none" stroke="#d6c2a2" stroke-width="3"/>
    <circle cx="852" cy="464" r="9" fill="#cf7a4f"/>
  </g>

  <!-- Trail Kiosk (46,70) : small guide hut + signboard -->
  <g filter="url(#soft)">
    <rect x="534" y="544" width="38" height="34" rx="6" fill="#9c8a6a"/>
    <rect x="566" y="540" width="4" height="40" fill="#7a6a4f"/>
    <rect x="566" y="546" width="22" height="14" rx="2" fill="#efe7da"/>
  </g>

  <!-- Decorative trees (denser to the left and along the edges) -->
  <g>
    <circle cx="60" cy="120" r="34" fill="url(#treeDark)"/>
    <circle cx="110" cy="180" r="28" fill="url(#tree)"/>
    <circle cx="50" cy="250" r="30" fill="url(#tree)"/>
    <circle cx="120" cy="320" r="26" fill="url(#treeDark)"/>
    <circle cx="60" cy="400" r="32" fill="url(#tree)"/>
    <circle cx="130" cy="470" r="26" fill="url(#treeDark)"/>
    <circle cx="55" cy="540" r="28" fill="url(#tree)"/>
    <circle cx="110" cy="620" r="30" fill="url(#treeDark)"/>
    <circle cx="60" cy="700" r="30" fill="url(#tree)"/>
    <circle cx="190" cy="250" r="24" fill="url(#tree)"/>
    <circle cx="250" cy="120" r="26" fill="url(#treeDark)"/>
    <circle cx="330" cy="70" r="24" fill="url(#tree)"/>
    <circle cx="410" cy="120" r="22" fill="url(#treeDark)"/>
    <circle cx="300" cy="250" r="22" fill="url(#tree)"/>
    <circle cx="250" cy="470" r="24" fill="url(#tree)"/>
    <circle cx="320" cy="560" r="22" fill="url(#treeDark)"/>
    <circle cx="540" cy="250" r="22" fill="url(#tree)"/>
    <circle cx="560" cy="430" r="22" fill="url(#treeDark)"/>
    <circle cx="700" cy="330" r="22" fill="url(#tree)"/>
    <circle cx="760" cy="640" r="26" fill="url(#tree)"/>
    <circle cx="660" cy="700" r="24" fill="url(#treeDark)"/>
    <circle cx="930" cy="300" r="24" fill="url(#treeDark)"/>
    <circle cx="1050" cy="300" r="30" fill="url(#tree)"/>
    <circle cx="1110" cy="380" r="28" fill="url(#treeDark)"/>
    <circle cx="1060" cy="460" r="30" fill="url(#tree)"/>
    <circle cx="1120" cy="540" r="26" fill="url(#treeDark)"/>
    <circle cx="990" cy="520" r="22" fill="url(#tree)"/>
    <circle cx="1040" cy="640" r="26" fill="url(#tree)"/>
    <circle cx="900" cy="560" r="22" fill="url(#treeDark)"/>
  </g>
</svg>
